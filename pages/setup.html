<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Complete Setup • MyPinkAssistant</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto;
            background: #fff;
            color: #111;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 24px
        }

        .card {
            width: min(520px, 100%);
            border: 1px solid #e8e8ee;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, .07)
        }

        h1 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 8px
        }

        p {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 14px
        }

        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-top: 12px
        }

        input {
            width: 100%;
            margin-top: 6px;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid #e8e8ee;
            font-size: 14px
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: 0;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #e91e63, #c2185b);
            color: #fff
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="/web/icon.svg">
    <link rel="apple-touch-icon" href="/web/apple-touch-icon.png">
    <link rel="manifest" href="/web/site.webmanifest">
    <meta name="theme-color" content="#e91e63">
</head>

<body>
    <div class="card">
        <h1>Finish Setting Up Your Account</h1>
        <p>Create your login and connect your InTouch account.</p>

        <form method="post" action="/setup-account">
            <input type="hidden" name="session_id" value="{{SESSION_ID}}" />

            <label>First Name</label>
            <input name="first_name" required />

            <label>Last Name</label>
            <input name="last_name" required />

            <label>Email</label>
            <input name="email" type="email" required />

            <label>Create Password</label>
            <input name="password" type="password" required />

            <label>InTouch Username</label>
            <input name="intouch_username" required />

            <label>InTouch Password</label>
            <input name="intouch_password" type="password" required />

            <button type="submit">Complete Setup</button>
        </form>
    </div>
</body>

</html>
