<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Log in • MyPinkAssistant</title>

    <!-- Optional: reuse your global stylesheet if you want -->
    <!-- <link rel="stylesheet" href="/web/styles.css" /> -->

    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --muted: #666666;
            --border: #e8e8ee;
            --card: #ffffff;
            --pink: #e91e63;
            /* tweak to match landing */
            --pink2: #c2185b;
            --shadow: 0 10px 28px rgba(0, 0, 0, .07);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .wrap {
            width: min(460px, 100%);
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
            font-weight: 800;
            letter-spacing: .2px;
        }

        .brand .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--pink), var(--pink2));
            box-shadow: 0 0 0 6px rgba(232, 74, 166, .12);
        }

        .brand span {
            font-size: 20px;
        }

        .brand span b {
            color: var(--pink);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
        }

        h1 {
            font-size: 18px;
            margin: 0 0 6px 0;
            text-align: center;
        }

        .sub {
            margin: 0 0 12px 0;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            line-height: 1.35;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-top: 12px;
        }

        input {
            width: 100%;
            margin-top: 6px;
            padding: 12px 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: rgba(232, 74, 166, .55);
            box-shadow: 0 0 0 5px rgba(232, 74, 166, .15);
        }

        .btn {
            width: 100%;
            margin-top: 14px;
            padding: 12px 12px;
            border: 0;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--pink), var(--pink2));
            color: #fff;
            box-shadow: 0 10px 20px rgba(232, 74, 166, .22);
        }

        .btn:disabled {
            opacity: .75;
            cursor: not-allowed;
        }

        .row {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 13px;
        }

        a {
            color: var(--pink);
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        .hint {
            margin-top: 12px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }

        .back {
            display: block;
            margin-top: 14px;
            text-align: center;
            font-size: 13px;
        }

        /* --- Emergency banner compatibility --- */
        html.ui-emergency-on body {
            align-items: flex-start !important;
            justify-content: center !important;
            padding-top: 90px !important;
            /* enough space for banner */
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="brand">
            <div class="dot"></div>
            <span>My<b>Pink</b>Assistant</span>
        </div>

        <div class="card">
            <h1>Log in</h1>


            <form method="post" action="/login">
                <label>Email</label>
                <input name="email" type="email" autocomplete="username" required />

                <label>Password</label>
                <input name="password" type="password" autocomplete="current-password" required />

                <button class="btn" type="submit">Log in</button>

                <div class="row">
                    <a href="/forgot">Forgot password?</a>

                </div>


            </form>
        </div>

        <a class="back" href="/">← Return to landing page</a>
    </div>
</body>

</html>
