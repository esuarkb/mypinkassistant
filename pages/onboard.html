<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Welcome to MyPinkAssistant</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto;
            background: #ffffff;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            width: min(520px, 100%);
            border: 1px solid #e8e8ee;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, .06);
        }

        h1 {
            margin: 0 0 8px;
            text-align: center;
            font-size: 20px;
        }

        p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-top: 14px;
        }

        input {
            width: 100%;
            margin-top: 6px;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid #e8e8ee;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            border: 0;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #e91e63, #c2185b);
            color: #fff;
        }

        .small {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Let’s finish setting up your account</h1>
        <p>This only takes a minute.</p>

        <form method="post" action="/onboard">

            <!-- MyPinkAssistant Account Info -->
            <label>First Name</label>
            <input name="first_name" required />

            <label>Last Name</label>
            <input name="last_name" required />

            <label>Email</label>
            <input name="email" type="email" required />

            <label>Create Password (for MyPinkAssistant login)</label>
            <input name="password" type="password" required />

            <label>Confirm Password</label>
            <input name="password2" type="password" required />

            <!-- InTouch Credentials -->
            <label>InTouch Username</label>
            <input name="intouch_username" required />

            <label>InTouch Password</label>
            <input name="intouch_password" type="password" required />

            <div class="small">
                Your InTouch password is encrypted and never shared.
            </div>

            <button type="submit">Create My Account</button>
        </form>
    </div>
</body>

</html>
