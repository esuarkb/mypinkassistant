<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Welcome to MyPinkAssistant.com</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto;
            background: #ffffff;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        * {
            box-sizing: border-box;
        }

        .logo {
            display: block;
            margin: 0 auto 16px;
            max-width: 180px;
        }

        .welcome {
            text-align: center;
            font-size: 15px;
            color: #555;
            margin-bottom: 14px;
        }

        .err {
            margin: 12px 0 6px;
            padding: 10px 12px;
            border: 1px solid #f3c1cf;
            background: #fff5f8;
            color: #8a1740;
            border-radius: 14px;
            font-size: 13px;
        }

        .err a {
            color: #8a1740;
            font-weight: 700;
            text-decoration: none;
        }

        .card {
            width: min(520px, 100%);
            border: 1px solid #e8e8ee;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, .06);
        }

        h1 {
            margin: 0 0 8px;
            text-align: center;
            font-size: 20px;
        }

        p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 22px;
            margin-bottom: 2px;
        }

        .section-header span {
            font-size: 12px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: .5px;
            white-space: nowrap;
        }

        .section-header hr {
            flex: 1;
            border: none;
            border-top: 1px solid #e8e8ee;
            margin: 0;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-top: 14px;
        }

        input {
            width: 100%;
            margin-top: 6px;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid #e8e8ee;
            font-size: 14px;
            transition: border-color .15s;
            outline: none;
        }

        input:focus {
            border-color: #e91e63;
            box-shadow: 0 0 0 3px rgba(233, 30, 99, .1);
        }

        input.field-error {
            border-color: #e53935;
            box-shadow: 0 0 0 3px rgba(229, 57, 53, .1);
        }

        /* Only affects the T&C checkbox row */
        .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 18px;
            font-size: 13px;
            line-height: 1.4;
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 3px;
            padding: 0;
            border-radius: 4px;
            cursor: pointer;
        }

        .checkbox-row label {
            margin: 0;
            font-size: 13px;
            font-weight: 400;
            color: #444;
            cursor: pointer;
        }

        .checkbox-row a {
            color: #c2185b;
            text-decoration: none;
            font-weight: 600;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            border: 0;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #e91e63, #c2185b);
            color: #fff;
        }

        button:hover {
            background: linear-gradient(135deg, #c2185b, #ad1457);
        }

        .small {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .lang-toggle {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .lang-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #e8e8ee;
            border-radius: 14px;
            background: #fff;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }

        .lang-btn.active {
            border-color: #e91e63;
            color: #e91e63;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="/web/icon.svg">
    <link rel="apple-touch-icon" href="/web/apple-touch-icon.png">
    <link rel="manifest" href="/web/site.webmanifest">
    <meta name="theme-color" content="#e91e63">
</head>

<body>
    <div class="card">
        {{REF_WELCOME}}
        <h1 data-en="Welcome to MyPinkAssistant.com 💕" data-es="Bienvenida a MyPinkAssistant.com 💕">Welcome to MyPinkAssistant.com 💕</h1>
        <p class="welcome" data-en="Ready to automate your customer &amp; order entry?" data-es="¿Lista para automatizar la entrada de clientes y pedidos?">
            Ready to automate your customer &amp; order entry?
        </p>
        <p data-en="Let's get you set up; this only takes a minute!" data-es="¡Vamos a configurarte; esto solo toma un minuto!">Let's get you set up; this only takes a minute!</p>

        {{ERROR_BLOCK}}

        <form method="post" action="/onboard" id="onboardForm">

            <input type="hidden" name="ref" value="{{REF}}">
            <input type="hidden" name="language" id="language" value="en">

            <div class="section-header"><span>Language / Idioma</span><hr></div>
            <div class="lang-toggle">
                <button type="button" class="lang-btn active" id="langEn">English</button>
                <button type="button" class="lang-btn" id="langEs">Español</button>
            </div>

            <div class="section-header"><span data-en="Your MyPinkAssistant Account" data-es="Tu Cuenta de MyPinkAssistant">Your MyPinkAssistant Account</span><hr></div>

            <label for="first_name" data-en="First Name" data-es="Nombre">First Name</label>
            <input id="first_name" name="first_name" value="{{FIRST_NAME}}" autocomplete="given-name" required />

            <label for="last_name" data-en="Last Name" data-es="Apellido">Last Name</label>
            <input id="last_name" name="last_name" value="{{LAST_NAME}}" autocomplete="family-name" required />

            <label for="email" data-en="Email" data-es="Correo Electrónico">Email</label>
            <input id="email" name="email" type="email" value="{{EMAIL}}" autocomplete="email" required />

            <label for="email2" data-en="Confirm Email" data-es="Confirmar Correo">Confirm Email</label>
            <input id="email2" type="email" autocomplete="email" required />

            <div id="emailErr" class="err" style="display:none;"></div>

            <label for="pw1" data-en="Password" data-es="Contraseña">Password</label>
            <input name="password" id="pw1" type="password" autocomplete="new-password" required />

            <label for="pw2" data-en="Confirm Password" data-es="Confirmar Contraseña">Confirm Password</label>
            <input name="password2" id="pw2" type="password" autocomplete="off" required />

            <div id="pwErr" class="err" style="display:none;"></div>

            <div class="section-header"><span data-en="Connect Your InTouch Account" data-es="Conecta Tu Cuenta de InTouch">Connect Your InTouch Account</span><hr></div>

            <label for="intouch_username" data-en="InTouch Username" data-es="Usuario de InTouch">InTouch Username</label>
            <input id="intouch_username" name="intouch_username"
                   placeholder="Your Mary Kay consultant ID"
                   data-en-ph="Your Mary Kay consultant ID"
                   data-es-ph="Tu ID de consultora Mary Kay"
                   autocomplete="off" required />

            <label for="intouch_password" data-en="InTouch Password" data-es="Contraseña de InTouch">InTouch Password</label>
            <input id="intouch_password" name="intouch_password" type="password" autocomplete="off" required />

            <div class="small" data-en="Your InTouch password is encrypted and never shared." data-es="Tu contraseña de InTouch está encriptada y nunca se comparte.">
                Your InTouch password is encrypted and never shared.
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="agree_terms" name="agree_terms" value="1" required>
                <label for="agree_terms" id="termsLabel">
                    I agree to the
                    <a href="/legal#terms" target="_blank">Terms &amp; Conditions</a>
                    and
                    <a href="/legal#privacy" target="_blank">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" id="submitBtn" data-en="Create My Account" data-es="Crear Mi Cuenta">Create My Account</button>
        </form>
    </div>

    <script src="/web/onboard.js"></script>
</body>

</html>
